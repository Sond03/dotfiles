shell zsh

confirm_os_window_close 0 # stop annoying close confirmation

#cool animation 
# cursor_trail 1 

# shortcuts / mappings
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size     all 0
map ctrl+kp_0 change_font_size  all 0
map page_up    scroll_page_up
map page_down    scroll_page_down
map ctrl+scroll_up change_font_size all +1
map ctrl+scroll_down change_font_size all -1
map ctrl+shift+scroll_up change_font_size all +1
map ctrl+shift+scroll_down change_font_size all -1

#Blur(might be overwritten by hyprland) and opacity for background 
background_blur 1
background_opacity 0.6

# BEGIN_KITTY_FONTS
font_family      family="Fira Code"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size  18
# END_KITTY_FONTS
#

shell_integration enabled
